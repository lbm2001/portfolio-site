name: Claude Code Review

on:
  # Auto-review when a PR opens or leaves draft — NOT on every push
  # (`synchronize`), which would re-run and re-bill on each commit. Comment
  # "@claude" on the PR to trigger a fresh review by hand.
  pull_request:
    types: [opened, ready_for_review]
  issue_comment:
    types: [created]

jobs:
  review:
    if: >
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      # claude-code-action fetches an OIDC token regardless of auth method;
      # without this the job fails before running the review at all ("Could
      # not fetch an OIDC token... add id-token: write").
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # `model` isn't a real input on this action version (silently
          # ignored, logged as "Unexpected input(s)") — the model is set via
          # the same --model flag the CLI itself takes, forwarded through
          # claude_args.
          claude_args: "--model claude-sonnet-5"
