# Listens for a mini-vla release and opens a PR bumping this repo's pin.
#
# mini-vla's e2e workflow fires a `mini-vla-release` repository_dispatch on every
# green v* tag (see its dispatch-portfolio job), carrying the tag in
# client_payload.tag. That dispatch must come from a PAT — the default
# GITHUB_TOKEN can't trigger a workflow in another repo — which is why mini-vla
# stores one. This side needs no extra secret: it runs inside portfolio-site, so
# the built-in GITHUB_TOKEN (with the permissions below) is enough to push a
# branch and open the PR.
#
# The job re-runs the real gates (asset staging, typecheck, lint, unit tests,
# build, e2e against a real Workers bundle, AND the slow train-to-convergence
# specs via VLA_FULL — worth the extra time here specifically, since a model
# bump is exactly the change most likely to regress in-browser training
# behavior without tripping typecheck/lint/unit) against the new pin BEFORE
# opening the PR, because a PR opened by GITHUB_TOKEN does NOT trigger ci.yml
# (GitHub blocks that recursion). Treat this run as the PR's CI. If branch
# protection later requires ci.yml's checks on the PR itself, swap `token`
# below for a PAT stored here too.
name: bump-mini-vla

on:
  repository_dispatch:
    types: [mini-vla-release]
  # Manual escape hatch: bump to an explicit tag without waiting for a release.
  workflow_dispatch:
    inputs:
      tag:
        description: mini-vla tag to pin (e.g. v0.5.0)
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    env:
      WRANGLER_SEND_METRICS: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Resolve tag
        id: tag
        env:
          RAW_TAG: ${{ github.event.client_payload.tag || github.event.inputs.tag }}
        run: |
          case "$RAW_TAG" in
            v[0-9]*) ;;
            *) echo "refusing to bump to unexpected tag: '$RAW_TAG'"; exit 1 ;;
          esac
          echo "tag=$RAW_TAG" >> "$GITHUB_OUTPUT"

      # Re-point the pin AND reinstall in one step: `npm install <spec>` rewrites
      # both package.json and package-lock.json. setup-node restores ~/.npm, so a
      # stale git resolution can survive across runs — `npm cache clean --force`
      # forces a fresh clone of the tag, and removing node_modules/mini-vla stops
      # an old checkout from shadowing it.
      - name: Bump pin + cache-clean reinstall
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          npm cache clean --force
          rm -rf node_modules/mini-vla
          npm install "mini-vla@github:lukasmueller-dev/mini-vla#${TAG}" --no-audit --no-fund

      # lib/vla-assets.ts derives the served asset path from mini-vla's own
      # package.json `version` field, not the git tag — the two are supposed
      # to agree (mini-vla's release process is meant to refuse to tag
      # otherwise), but that hasn't always held (see review-round-1 finding
      # #2: v0.7.1 was tagged while package.json stayed at 0.7.0). Catch a
      # repeat here, at bump time, rather than silently shipping content
      # under a stale-looking version path.
      - name: Verify mini-vla package version matches the bumped tag
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          PKG_VERSION=$(node -p "require('mini-vla/package.json').version")
          EXPECTED="${TAG#v}"
          if [ "$PKG_VERSION" != "$EXPECTED" ]; then
            echo "::warning::mini-vla tag ${TAG} has package.json version ${PKG_VERSION} — the versioned asset path will read /vla/${PKG_VERSION}/, not /vla/${EXPECTED}/. Confirm this is intentional before merging."
          fi

      # vla-assets.test.ts asserts public/vla/<version>/ exists (see ci.yml).
      - name: Stage mini-vla assets
        run: node scripts/copy-vla-assets.mjs

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npx next build

      - name: Build worker (next build + OpenNext bundle)
        run: npm run e2e:build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      # A model bump is exactly the change most likely to regress in-browser
      # training/rollout behavior without tripping typecheck/lint/unit — run
      # the full suite including the slow train-to-convergence specs
      # (VLA_FULL), which ci.yml's own e2e job deliberately skips on every
      # push to stay fast.
      - name: E2E including train-to-convergence (Playwright vs wrangler dev)
        run: npm run e2e:full

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Open bump PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: |
            package.json
            package-lock.json
          branch: bump/mini-vla-${{ steps.tag.outputs.tag }}
          commit-message: "chore(deps): bump mini-vla to ${{ steps.tag.outputs.tag }}"
          title: "chore(deps): bump mini-vla to ${{ steps.tag.outputs.tag }}"
          body: |
            Automated bump: mini-vla released **${{ steps.tag.outputs.tag }}** (its
            e2e suite passed green on the tag).

            This branch was reinstalled against the new pin and the gates below
            all passed here before the PR opened:

            - version-consistency check (package.json `version` vs. the bumped tag)
            - `copy-vla-assets` (stages `public/vla/<version>/`)
            - `npm run typecheck`
            - `npm run lint`
            - `npm test`
            - `npx next build`
            - `npm run e2e:build` + `npm run e2e:full` (Playwright vs. `wrangler
              dev`, including the slow train-to-convergence specs)

            Note: PRs opened by `GITHUB_TOKEN` don't re-run `ci.yml`, so the run
            that produced this PR is the CI signal. Merge to ship the new
            in-browser model to the live demo.
