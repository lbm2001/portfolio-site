<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  html,body{margin:0;padding:0;background:#ffffff;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
  *{box-sizing:border-box;}
  @keyframes dashmove{to{stroke-dashoffset:-1000;}}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.6);opacity:.35;}}
  @keyframes tokfeed{0%,100%{opacity:.4;}50%{opacity:1;}}
</style>
</helmet>

<div style="position:relative;min-height:100vh;background:#ffffff;font-family:'Helvetica Neue',Archivo,Arial,sans-serif;color:#111111;overflow:hidden;">

  <!-- NAV -->
  <nav style="position:relative;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:18px 56px;border-bottom:1px solid rgba(0,0,0,.1);background:rgba(225,45,26,.04);backdrop-filter:blur(10px);">
    <div style="font-weight:700;font-size:16px;letter-spacing:-.01em;color:#111;">Lukas Müller</div>
    <div style="display:flex;gap:32px;font:600 14px/1 'Helvetica Neue',Archivo,Arial,sans-serif;color:#111;">
      <span>About</span><span>Resume</span><span>Projects</span><span>Blog</span>
    </div>
  </nav>

  <!-- STAGE -->
  <div ref="{{ setStage }}" style="position:relative;width:100%;height:calc(100vh - 61px);min-height:700px;">

    <!-- VLA wrapper — always opaque; boxes reposition + reveal full content once training starts -->
    <div style="position:absolute;inset:0;opacity:1;">

      <!-- orthogonal data pipeline — right-angle rails, routes around the hero -->
      <svg ref="{{ setWireSvg }}" viewBox="0 0 1000 1000" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;opacity: {{ flowOpacity }};">
        <!-- static base wire -->
        <g fill="none" stroke="rgba(0,0,0,.16)" stroke-width="1.4" stroke-linejoin="round" vector-effect="non-scaling-stroke">
          <path data-wire="top" d="M94,387 V199 H900 V342" />
          <path data-wire="bottom" d="M94,613 V782 H900 V658" />
        </g>
        <!-- continuous signal (only visible while training) -->
        <g fill="none" stroke-linejoin="round" vector-effect="non-scaling-stroke" opacity="{{ flowSignalOpacity }}">
          <g stroke="{{ accent }}" stroke-width="1.8" opacity=".16">
            <path data-wire="top" d="M94,387 V199 H900 V342" />
            <path data-wire="bottom" d="M94,613 V782 H900 V658" />
          </g>
          <g stroke="{{ accent }}" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="8 22" opacity=".55">
            <path data-wire="top" d="M94,387 V199 H900 V342" style="animation:dashmove 3.6s linear infinite;" />
            <path data-wire="bottom" d="M94,613 V782 H900 V658" style="animation:dashmove 3.6s linear infinite;animation-delay:.6s;" />
          </g>
        </g>
      </svg>

      <!-- INPUT — far-left anchor -->
      <div ref="{{ setInput }}" style="position:absolute;left: {{ inputLeft }};top: {{ inputTop }};transform: {{ inputTransform }};z-index:3;width:212px;background:#fcfcfc;border:1px solid rgba(0,0,0,.1);border-radius:3px;padding:14px;transition:left .5s cubic-bezier(.22,.61,.36,1),top .5s cubic-bezier(.22,.61,.36,1),transform .5s cubic-bezier(.22,.61,.36,1);">
        <!-- raw prompt (textarea) — floats above, does not affect vertical centering below; also the source for the language-encoder wire -->
        <div ref="{{ setPrompt }}" style="position:absolute;left:0;right:0;bottom:100%;margin-bottom:10px;border:1px solid rgba(0,0,0,.2);border-radius:3px;background:#fff;padding:9px 11px 12px;font:500 12.5px/1.45 ui-monospace,Menlo,monospace;color:#111;opacity: {{ detailOpacity }};pointer-events: {{ detailPointer }};transition:opacity .35s ease;">
          pick up the red block
          <span style="position:absolute;right:3px;bottom:3px;width:9px;height:9px;background:repeating-linear-gradient(135deg,transparent 0 2px,rgba(0,0,0,.3) 2px 3px);"></span>
        </div>
        <div style="position: {{ labelPosition }};top: {{ labelTop }};left: {{ labelLeft }};transform: {{ labelTransform }};opacity: {{ detailOpacity }};transition:opacity .35s ease;font:600 10px/1 ui-monospace,Menlo,monospace;letter-spacing:.16em;text-transform:uppercase;color:#9a9a9a;margin-bottom:10px;white-space:nowrap;">Demonstration</div>
        <canvas ref="{{ setDemo }}" style="width:100%;height:186px;display:block;opacity: {{ demoOpacity }};transition:opacity .35s ease;"></canvas>
      </div>

      <!-- VISION ENCODER — patch chunks -->
      <div ref="{{ setVisionCard }}" style="position:absolute;left: {{ visionLeft }};top: {{ visionTop }};transform: {{ visionTransform }};z-index:3;background:#fcfcfc;border:1px solid rgba(0,0,0,.1);border-radius:3px;padding:14px;text-align:center;transition:left .5s cubic-bezier(.22,.61,.36,1),top .5s cubic-bezier(.22,.61,.36,1),transform .5s cubic-bezier(.22,.61,.36,1);">
        <div style="position: {{ labelPosition }};top: {{ labelTop }};left: {{ labelLeft }};transform: {{ labelTransform }};font:600 10px/1 ui-monospace,Menlo,monospace;letter-spacing:.16em;text-transform:uppercase;color:#9a9a9a;margin-bottom:10px;white-space:nowrap;">Vision Encoder</div>
        <canvas ref="{{ setVision }}" width="176" height="176" style="width:176px;height:176px;display:block;opacity: {{ detailOpacity }};transition:opacity .35s ease;"></canvas>
      </div>

      <!-- LANGUAGE ENCODER — feed-forward sequence -->
      <div ref="{{ setLangCard }}" style="position:absolute;left: {{ langLeft }};top: {{ langTop }};transform: {{ langTransform }};z-index:3;background:#fcfcfc;border:1px solid rgba(0,0,0,.1);border-radius:3px;padding:14px 16px;transition:left .5s cubic-bezier(.22,.61,.36,1),top .5s cubic-bezier(.22,.61,.36,1),transform .5s cubic-bezier(.22,.61,.36,1);">
        <div style="position: {{ labelPosition }};top: {{ labelTop }};left: {{ labelLeft }};transform: {{ labelTransform }};font:600 10px/1 ui-monospace,Menlo,monospace;letter-spacing:.16em;text-transform:uppercase;color:#9a9a9a;margin-bottom:9px;white-space:nowrap;">Language Encoder</div>
        <div style="opacity: {{ detailOpacity }};transition:opacity .35s ease;">
        <div style="font:500 11.5px/1 ui-monospace,Menlo,monospace;color:#9a9a9a;margin-bottom:11px;">"pick up the red block"</div>
        <div style="display:flex;align-items:center;gap:0;">
          <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
            <span style="font:500 12px/1 ui-monospace,Menlo,monospace;background:#f4f4f4;border:1px solid rgba(0,0,0,.1);color:#4a4a4a;padding:6px 10px;border-radius:3px;">pick</span>
            <div style="width:26px;height:4px;background:#ececec;border-radius:2px;overflow:hidden;"><div style="height:100%;background: {{ accent }};width: {{ attnPick }};transition:width .3s ease;"></div></div>
          </div>
          <span style="color:#cfcfcf;font-size:13px;padding:0 6px;margin-bottom:14px;">→</span>
          <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
            <span style="font:500 12px/1 ui-monospace,Menlo,monospace;background:#f4f4f4;border:1px solid rgba(0,0,0,.1);color:#4a4a4a;padding:6px 10px;border-radius:3px;">up</span>
            <div style="width:26px;height:4px;background:#ececec;border-radius:2px;overflow:hidden;"><div style="height:100%;background: {{ accent }};width: {{ attnUp }};transition:width .3s ease;"></div></div>
          </div>
          <span style="color:#cfcfcf;font-size:13px;padding:0 6px;margin-bottom:14px;">→</span>
          <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
            <span style="font:500 12px/1 ui-monospace,Menlo,monospace;background:#f4f4f4;border:1px solid rgba(0,0,0,.1);color:#4a4a4a;padding:6px 10px;border-radius:3px;">the</span>
            <div style="width:26px;height:4px;background:#ececec;border-radius:2px;overflow:hidden;"><div style="height:100%;background: {{ accent }};width: {{ attnThe }};transition:width .3s ease;"></div></div>
          </div>
          <span style="color:#cfcfcf;font-size:13px;padding:0 6px;margin-bottom:14px;">→</span>
          <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
            <span style="font:500 12px/1 ui-monospace,Menlo,monospace;background:#f4f4f4;border:1px solid rgba(0,0,0,.1);color:#4a4a4a;padding:6px 10px;border-radius:3px;">red</span>
            <div style="width:26px;height:4px;background:#ececec;border-radius:2px;overflow:hidden;"><div style="height:100%;background: {{ accent }};width: {{ attnRed }};transition:width .3s ease;"></div></div>
          </div>
          <span style="color:#cfcfcf;font-size:13px;padding:0 6px;margin-bottom:14px;">→</span>
          <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
            <span style="font:500 12px/1 ui-monospace,Menlo,monospace;background: {{ blockBg }};color: {{ blockFg }};padding:6px 10px;border-radius:3px;transition:background .3s ease,color .3s ease;">block</span>
            <div style="width:26px;height:4px;background:#ececec;border-radius:2px;overflow:hidden;"><div style="height:100%;background: {{ accent }};width: {{ attnBlock }};transition:width .3s ease;"></div></div>
          </div>
        </div>
        <div style="margin-top:9px;font:500 9px/1 ui-monospace,Menlo,monospace;letter-spacing:.1em;text-transform:uppercase;color:#c3bab3;">↳ live attention weight</div>
        </div>
      </div>

      <!-- OUTPUT — far-right destination -->
      <div ref="{{ setOutputCard }}" style="position:absolute;left: {{ outputLeft }};right: {{ outputRight }};top: {{ outputTop }};transform: {{ outputTransform }};z-index:3;width:212px;background:#fcfcfc;border:1px solid rgba(0,0,0,.1);border-radius:3px;padding:14px;transition:left .5s cubic-bezier(.22,.61,.36,1),top .5s cubic-bezier(.22,.61,.36,1),transform .5s cubic-bezier(.22,.61,.36,1);">
        <div style="position: {{ labelPosition }};top: {{ labelTop }};left: {{ labelLeft }};transform: {{ labelTransform }};font:600 10px/1 ui-monospace,Menlo,monospace;letter-spacing:.16em;text-transform:uppercase;color:#9a9a9a;margin-bottom:10px;white-space:nowrap;">Rollout</div>
        <canvas ref="{{ setArm }}" style="width:100%;height:186px;display:block;opacity: {{ detailOpacity }};transition:opacity .35s ease;"></canvas>
      </div>

      <!-- TRAINING BAR -->
      <div style="position:absolute;left:50%;bottom:3.5%;transform:translateX(-50%);z-index:8;width:min(560px,86vw);display:flex;align-items:center;gap:16px;background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:3px;padding:12px 14px;">
        <div style="display:flex;align-items:center;gap:8px;min-width:96px;">
          <span style="width:8px;height:8px;border-radius:50%;background: {{ statusDot }};animation: {{ dotAnim }};"></span>
          <span style="font:600 11px/1 ui-monospace,Menlo,monospace;letter-spacing:.1em;text-transform:uppercase;color:#4a4a4a;">{{ statusText }}</span>
        </div>
        <div style="flex:1;">
          <div style="font:500 10px/1 ui-monospace,Menlo,monospace;color:#9a9a9a;margin-bottom:5px;">browser training · MSE loss</div>
          <canvas ref="{{ setLossCurve }}" style="width:100%;height:34px;display:block;"></canvas>
        </div>
        <div style="font:600 12px/1 ui-monospace,Menlo,monospace;color:#111;min-width:46px;text-align:right;">{{ lossText }}</div>
        <button onClick="{{ onToggle }}" style="cursor:pointer;border-radius:3px;padding:10px 16px;font:600 13px/1 'Helvetica Neue',Archivo,Arial,sans-serif;background: {{ btnBg }};color: {{ btnFg }};border:1px solid {{ btnBorder }};white-space:nowrap;transition:opacity .2s ease;">{{ buttonLabel }}</button>
      </div>

    </div>

    <!-- HERO — clean central axis, never crossed -->
    <div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:10;text-align:center;pointer-events:none;transition:opacity .55s ease;opacity: {{ heroOpacity }};">
      <h1 style="margin:0;font-weight:700;font-size:46px;line-height:1.02;letter-spacing:-.03em;color:#111;">Lukas Müller</h1>
      <div style="margin-top:16px;font:600 11px/1 ui-monospace,Menlo,monospace;letter-spacing:.18em;text-transform:uppercase;color:#e12d1a;">MACHINE&nbsp;LEARNING&nbsp;&amp;&nbsp;ROBOT&nbsp;LEARNING</div>
      <div style="margin-top:28px;display:flex;gap:12px;justify-content:center;pointer-events:auto;">
        <button style="cursor:pointer;background:#111;color:#fff;border:1px solid #111;border-radius:3px;padding:14px 24px;font:600 14px/1 'Helvetica Neue',Archivo,Arial,sans-serif;">Contact</button>
        <button style="cursor:pointer;background:transparent;color:#111;border:1px solid rgba(0,0,0,.22);border-radius:3px;padding:14px 24px;font:600 14px/1 'Helvetica Neue',Archivo,Arial,sans-serif;">Download Resume</button>
      </div>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: &quot;100%&quot; },
  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#e12d1a&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#e12d1a&quot;, &quot;#111111&quot;, &quot;#2A6FDB&quot;, &quot;#1F8A5B&quot;] },
  &quot;dimOpacity&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 0.22, &quot;min&quot;: 0.08, &quot;max&quot;: 0.6, &quot;step&quot;: 0.02, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;VLA&quot;, &quot;unit&quot;: &quot;&quot; },
  &quot;showFlow&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;VLA&quot; }
}">
class Component extends DCLogic {
  state = { hover:false, training:false, loss:0.82 };
  arm = { a1:-1.5708, a2:0 };
  trail = [];

  setStage = (el)=>{ this.stage = el; };
  setWireSvg = (el)=>{ this.wireSvg = el; };
  setInput = (el)=>{ this.inputEl = el; };
  setPrompt = (el)=>{ this.promptEl = el; };
  setVisionCard = (el)=>{ this.visionCard = el; };
  setLangCard = (el)=>{ this.langCard = el; };
  setOutputCard = (el)=>{ this.outputCard = el; };
  setDemo = (el)=>{ this.demoCanvas = el; };
  setVision = (el)=>{ this.visionCanvas = el; };
  setArm = (el)=>{ this.armCanvas = el; };
  setLossCurve = (el)=>{ this.lossCurveCanvas = el; };
  onEnter = ()=> this.setState({ hover:true });
  onLeave = ()=> this.setState({ hover:false });

  startTraining = ()=>{
    if(this.state.training) return;
    this.trail = [];
    this.lossHistory = [0.82];
    this.setState({ training:true, loss:0.82 });
    this.lossTimer = setInterval(()=>{
      this.setState(s=>{
        let l = s.loss + (0.038 - s.loss)*0.05 + (Math.random()-0.5)*0.012;
        l = Math.max(0.03, l);
        this.lossHistory.push(l);
        if(this.lossHistory.length>90) this.lossHistory.shift();
        return { loss:l };
      });
    }, 150);
  };
  reset = ()=>{
    if(this.lossTimer) clearInterval(this.lossTimer);
    this.trail = [];
    this.lossHistory = [];
    this.arm = { a1:-1.5708, a2:0 };
    this.setState({ training:false, loss:0.82 });
  };

  lossNorm(){ return Math.max(0, Math.min(1, (this.state.loss - 0.038)/(0.82-0.038))); }

  // measure real card positions -> orthogonal rail paths in the 1000x1000 viewBox
  layoutWires = ()=>{
    if(!this.stage || !this.wireSvg) return;
    if(!this.inputEl || !this.promptEl || !this.visionCard || !this.langCard || !this.outputCard) return;
    const R = this.stage.getBoundingClientRect();
    const m = (el)=>{ const c=el.getBoundingClientRect(); return {
      cx:(c.left-R.left+c.width/2)/R.width*1000,
      cy:(c.top-R.top+c.height/2)/R.height*1000,
      top:(c.top-R.top)/R.height*1000,
      bottom:(c.bottom-R.top)/R.height*1000,
    };};
    const I=m(this.inputEl), P=m(this.promptEl), V=m(this.visionCard), L=m(this.langCard), O=m(this.outputCard);
    const r = (n)=>n.toFixed(1);
    // vision reads the demonstration image (Input card); language reads the raw prompt
    const dTop = `M${r(I.cx)},${r(I.top)} V${r(V.cy)} H${r(O.cx)} V${r(O.top)}`;
    const dBot = `M${r(P.cx)},${r(P.bottom)} V${r(L.cy)} H${r(O.cx)} V${r(O.bottom)}`;
    this.wireSvg.querySelectorAll('[data-wire="top"]').forEach(p=>p.setAttribute('d',dTop));
    this.wireSvg.querySelectorAll('[data-wire="bottom"]').forEach(p=>p.setAttribute('d',dBot));
  };

  componentDidMount(){
    this.accent = this.props.accent || '#e12d1a';
    const rows = [
      "................","................",
      "...##########...","...##########...",
      "..........###...",".........###....",
      "......#####.....","......#####.....",
      "..........###...","...........###..",
      "...........###..","..#.......###...",
      "..###....###....","...#########....",
      "....######......","................"
    ];
    this.mask = rows.map(r=>[...r].map(c=>c==='#'?1:0));
    this.lossHistory = [];
    this.sceneCanvas = document.createElement('canvas'); this.sceneCanvas.width=184; this.sceneCanvas.height=186;
    this.sceneCtx = this.sceneCanvas.getContext('2d');
    this.thumbCanvas = document.createElement('canvas'); this.thumbCanvas.width=16; this.thumbCanvas.height=16;
    this.thumbCtx = this.thumbCanvas.getContext('2d');
    this.layoutWires();
    [80,300,700].forEach(t=>setTimeout(this.layoutWires,t));
    window.addEventListener('resize', this.layoutWires);
    let last = performance.now();
    const loop = (now)=>{
      const dt = Math.min(0.05,(now-last)/1000); last = now;
      this.layoutWires(); this.drawDemo(now); this.drawVision(now); this.drawArm(now, dt); this.drawLossCurve();
      this.raf = requestAnimationFrame(loop);
    };
    this.raf = requestAnimationFrame(loop);
  }
  componentWillUnmount(){
    cancelAnimationFrame(this.raf);
    if(this.lossTimer) clearInterval(this.lossTimer);
    window.removeEventListener('resize', this.layoutWires);
  }

  drawDemo(now){
    const c = this.demoCanvas; if(!c) return;
    const dpr = window.devicePixelRatio || 1;
    const W = c.offsetWidth || 190, H = c.offsetHeight || 150;
    if(c.width !== Math.round(W*dpr)) c.width = Math.round(W*dpr);
    if(c.height !== Math.round(H*dpr)) c.height = Math.round(H*dpr);
    const ctx = c.getContext('2d');
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,W,H);
    const acc = this.accent || '#e12d1a';

    // full 16x16 grid, edge-to-edge — same resolution the vision encoder tokenizes
    // full 16x16 grid, edge-to-edge — same resolution the vision encoder tokenizes; only shown once training starts
    if(this.state.training){
      ctx.strokeStyle='rgba(0,0,0,.16)'; ctx.lineWidth=1;
      const cells=16;
      for(let i=0;i<=cells;i++){
        const x=Math.min(W-0.5, Math.max(0.5, Math.round(i*W/cells)+0.5));
        ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
      }
      for(let i=0;i<=cells;i++){
        const y=Math.min(H-0.5, Math.max(0.5, Math.round(i*H/cells)+0.5));
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
      }
    }

    // looping demonstration: reach → grasp the red block → lift → return upright
    const bx=W*0.50, by=H*0.72, L1=H*0.27, L2=H*0.23, box=18, floorY=by+9;
    const redBox={x:W*0.84, y:floorY};
    const upright={a1:-1.5708, a2:0};
    const reachPose = this.ikTo(bx,by,L1,L2, redBox.x, redBox.y-box-2);
    const liftPose   = this.ikTo(bx,by,L1,L2, redBox.x, redBox.y-box-34);
    const ease = (x)=> x<=0?0:x>=1?1:(1-Math.cos(x*Math.PI))/2;
    const lerp = (a,b,u)=> a+(b-a)*u;

    const period = 4200;
    const t = ((now||0) % period) / period;
    let a1,a2,grasped;
    if(t < 0.22){ const u=ease(t/0.22); a1=lerp(upright.a1,reachPose.a1,u); a2=lerp(upright.a2,reachPose.a2,u); grasped=u>0.85; }
    else if(t < 0.36){ a1=reachPose.a1; a2=reachPose.a2; grasped=true; }
    else if(t < 0.60){ const u=ease((t-0.36)/0.24); a1=lerp(reachPose.a1,liftPose.a1,u); a2=lerp(reachPose.a2,liftPose.a2,u); grasped=true; }
    else if(t < 0.68){ a1=liftPose.a1; a2=liftPose.a2; grasped=true; }
    else if(t < 0.90){ const u=ease((t-0.68)/0.22); a1=lerp(liftPose.a1,upright.a1,u); a2=lerp(liftPose.a2,upright.a2,u); grasped=u<0.6; }
    else { a1=upright.a1; a2=upright.a2; grasped=false; }

    this.paintScene(ctx, W, H, { a1, a2, acc, training:false, trail:null, ln:0, carryRed:grasped, gripActive:grasped });
  }

  // shared robot-scene renderer — used by BOTH the input demonstration and the output rollout
  paintScene(ctx, W, H, { a1, a2, acc, training, trail, ln, carryRed, gripActive }){
    const bx=W*0.50, by=H*0.72, L1=H*0.27, L2=H*0.23;
    const box=18, floorY=by+9;
    const blackBox={x:W*0.16, y:floorY};
    const redBox={x:W*0.84, y:floorY};

    const j1x=bx+Math.cos(a1)*L1, j1y=by+Math.sin(a1)*L1;
    const ang=a1+a2;
    const ex=j1x+Math.cos(ang)*L2, ey=j1y+Math.sin(ang)*L2;

    // floor line — full width, connects through to both boxes
    ctx.strokeStyle='#e6e6e6'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(0,floorY); ctx.lineTo(W,floorY); ctx.stroke();

    // trajectory trail
    if(training && trail){
      ctx.lineWidth = 1.4; ctx.strokeStyle = acc;
      ctx.globalAlpha = 0.28 + 0.4*(1-ln);
      ctx.beginPath();
      trail.forEach((p,i)=>{ const n=ln*7; const px=p.x+(Math.random()-0.5)*n, py=p.y+(Math.random()-0.5)*n; i?ctx.lineTo(px,py):ctx.moveTo(px,py); });
      ctx.stroke(); ctx.globalAlpha = 1;
    }

    // flat boxes on each side
    const flatBox=(cx,yb,fill)=>{ ctx.fillStyle=fill; ctx.fillRect(cx-box/2, yb-box, box, box); };
    flatBox(blackBox.x, blackBox.y, '#1c1c1c');
    if(!carryRed) flatBox(redBox.x, redBox.y, acc);

    // base pedestal
    ctx.fillStyle='#2b2b2b'; ctx.fillRect(bx-13,by,26,9);

    // links + revolute joints
    ctx.strokeStyle='#8a8a8a'; ctx.lineCap='round';
    ctx.lineWidth=7; ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(j1x,j1y); ctx.stroke();
    ctx.lineWidth=5.5; ctx.beginPath(); ctx.moveTo(j1x,j1y); ctx.lineTo(ex,ey); ctx.stroke();
    ctx.lineWidth=2; ctx.strokeStyle='#8a8a8a'; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(bx,by,4.5,0,7); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(j1x,j1y,3.5,0,7); ctx.fill(); ctx.stroke();

    // end effector — a single dot
    ctx.fillStyle = gripActive ? acc : '#6f6f6f';
    ctx.beginPath(); ctx.arc(ex, ey, 4, 0, 7); ctx.fill();

    // carried red block — replaces the resting box once grasped
    if(carryRed){ ctx.fillStyle=acc; ctx.fillRect(ex-box/2, ey-box/2+2, box, box); ctx.fillStyle = gripActive ? acc : '#6f6f6f'; ctx.beginPath(); ctx.arc(ex, ey, 4, 0, 7); ctx.fill(); }
    return { bx, by, L1, L2, box, floorY, blackBox, redBox };
  }

  ikTo(bx,by,L1,L2,tx,ty){
    const dx=tx-bx, dy=ty-by;
    let d=Math.hypot(dx,dy); d=Math.min(d,(L1+L2)*0.995);
    const ca2=Math.max(-1,Math.min(1,(d*d-L1*L1-L2*L2)/(2*L1*L2)));
    const a2=Math.acos(ca2);
    const a1=Math.atan2(dy,dx)-Math.atan2(L2*Math.sin(a2), L1+L2*Math.cos(a2));
    return {a1,a2};
  }

  // renders the current robot scene, then heavily downsamples it to 16x16 —
  // this is literally what the vision encoder tokenizes
  renderThumb(){
    const ctx = this.sceneCtx, W=184, H=186;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,W,H);
    this.paintScene(ctx, W, H, { a1:this.arm.a1, a2:this.arm.a2, acc:this.accent, training:false, trail:null, ln:0, gripActive:this.state.training });
    this.thumbCtx.imageSmoothingEnabled = true;
    this.thumbCtx.clearRect(0,0,16,16);
    this.thumbCtx.drawImage(this.sceneCanvas,0,0,W,H,0,0,16,16);
  }

  drawVision(now){
    const c = this.visionCanvas; if(!c) return;
    const dpr = window.devicePixelRatio || 1;
    const S=176;
    if(c.width !== Math.round(S*dpr)) c.width = Math.round(S*dpr);
    if(c.height !== Math.round(S*dpr)) c.height = Math.round(S*dpr);
    const ctx = c.getContext('2d');
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,S,S);
    const { training } = this.state;
    const gap=3, np=4, po=(S-gap*(np+1))/np, ps=po/4;

    let thumb=null;
    if(training){ this.renderThumb(); thumb = this.thumbCtx.getImageData(0,0,16,16).data; }

    for(let py=0;py<np;py++) for(let px=0;px<np;px++){
      const ox=gap+px*(po+gap), oy=gap+py*(po+gap);
      ctx.fillStyle = ((px+py)%2)? '#f6f6f6' : '#efefef';
      ctx.fillRect(ox,oy,po,po);
      let hasContent=false;
      for(let iy=0;iy<4;iy++) for(let ix=0;ix<4;ix++){
        const gx=px*4+ix, gy=py*4+iy;
        let r,g,b;
        if(!training){ r=g=b=244; }
        else {
          const idx=(gy*16+gx)*4;
          const sr=thumb[idx], sg=thumb[idx+1], sb=thumb[idx+2];
          if((255-sr)+(255-sg)+(255-sb) > 30) hasContent=true;
          const noise = (Math.random()-0.5)*this.state.loss*200;
          r=Math.max(0,Math.min(255,sr+noise)); g=Math.max(0,Math.min(255,sg+noise)); b=Math.max(0,Math.min(255,sb+noise));
        }
        ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
        ctx.fillRect(ox+ix*ps+0.5, oy+iy*ps+0.5, ps-1, ps-1);
      }
      const active = training && hasContent && (Math.sin(now*0.004 + (px+py))>0.3);
      ctx.strokeStyle = active ? this.accent : 'rgba(0,0,0,.12)';
      ctx.lineWidth = active ? 1.4 : 1;
      ctx.strokeRect(ox+0.5, oy+0.5, po-1, po-1);
    }
  }

  drawLossCurve(){
    const c = this.lossCurveCanvas; if(!c) return;
    const dpr = window.devicePixelRatio || 1;
    const W = c.offsetWidth || 300, H = c.offsetHeight || 34;
    if(c.width !== Math.round(W*dpr)) c.width = Math.round(W*dpr);
    if(c.height !== Math.round(H*dpr)) c.height = Math.round(H*dpr);
    const ctx = c.getContext('2d');
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,W,H);
    const hist = this.lossHistory || [];
    const pad = 3, maxLoss = 0.82;
    // baseline
    ctx.strokeStyle = '#efefef'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0,H-pad); ctx.lineTo(W,H-pad); ctx.stroke();
    if(hist.length < 2) return;
    const acc = this.accent || '#e12d1a';
    const n = hist.length;
    const x = (i)=> (i/(n-1)) * W;
    const y = (v)=> pad + (1 - Math.min(1, v/maxLoss)) * (H - pad*2);
    // filled area under the curve
    ctx.beginPath(); ctx.moveTo(0, y(hist[0]));
    hist.forEach((v,i)=> ctx.lineTo(x(i), y(v)));
    ctx.lineTo(W, H-pad); ctx.lineTo(0, H-pad); ctx.closePath();
    ctx.fillStyle = acc; ctx.globalAlpha = 0.08; ctx.fill(); ctx.globalAlpha = 1;
    // curve line
    ctx.beginPath(); ctx.moveTo(0, y(hist[0]));
    hist.forEach((v,i)=> ctx.lineTo(x(i), y(v)));
    ctx.strokeStyle = acc; ctx.lineWidth = 1.6; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    ctx.stroke();
    // current point
    const lx = x(n-1), ly = y(hist[n-1]);
    ctx.fillStyle = acc; ctx.beginPath(); ctx.arc(lx, ly, 2.6, 0, 7); ctx.fill();
  }

  drawArm(now, dt){
    const c = this.armCanvas; if(!c) return;
    const dpr = window.devicePixelRatio || 1;
    const W = c.offsetWidth || 190, H = c.offsetHeight || 186;
    if(c.width !== Math.round(W*dpr)) c.width = Math.round(W*dpr);
    if(c.height !== Math.round(H*dpr)) c.height = Math.round(H*dpr);
    const ctx = c.getContext('2d');
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,W,H);
    const { training } = this.state;
    const acc = this.accent || '#e12d1a';
    const ln = this.lossNorm();

    // same geometry as paintScene, needed here only to compute the IK target
    const bx=W*0.50, by=H*0.72, L1=H*0.27, L2=H*0.23, box=18, floorY=by+9;
    const redBox={x:W*0.84, y:floorY};
    const tx=redBox.x, ty=redBox.y-box-3;

    if(training){
      // 2-link IK to the red box (elbow up)
      const dx=tx-bx, dy=ty-by;
      let d=Math.hypot(dx,dy); d=Math.min(d,(L1+L2)*0.99);
      const ca2=Math.max(-1,Math.min(1,(d*d-L1*L1-L2*L2)/(2*L1*L2)));
      const a2t=Math.acos(ca2);
      const a1t=Math.atan2(dy,dx)-Math.atan2(L2*Math.sin(a2t), L1+L2*Math.cos(a2t));
      const jit = ln*0.30;
      this.arm.a1 += ((a1t+(Math.random()-0.5)*jit) - this.arm.a1)*0.06;
      this.arm.a2 += ((a2t+(Math.random()-0.5)*jit) - this.arm.a2)*0.06;
    } else { this.arm.a1 = -1.5708; this.arm.a2 = 0; } // upright at rest

    if(training){
      const j1x=bx+Math.cos(this.arm.a1)*L1, j1y=by+Math.sin(this.arm.a1)*L1;
      const ang=this.arm.a1+this.arm.a2;
      const ex=j1x+Math.cos(ang)*L2, ey=j1y+Math.sin(ang)*L2;
      this.trail.push({x:ex,y:ey}); if(this.trail.length>64) this.trail.shift();
    }

    this.paintScene(ctx, W, H, { a1:this.arm.a1, a2:this.arm.a2, acc, training, trail:this.trail, ln, gripActive:training });
  }

  renderVals(){
    const { hover, training, loss } = this.state;
    const accent = this.props.accent || '#e12d1a';
    const dim = this.props.dimOpacity ?? 0.22;
    const progress = Math.max(0, Math.min(1, (0.82 - loss)/(0.82-0.038)));
    // live attention weights — as training converges, focus shifts from the verb onto the target object
    const p = training ? progress : 0;
    const pct = (v)=> (Math.max(0.04, Math.min(1, v))*100).toFixed(0) + '%';
    const attnPick = pct(0.22 - 0.14*p);
    const attnUp   = pct(0.10 - 0.05*p);
    const attnThe  = pct(0.07 - 0.03*p);
    const attnRed  = pct(0.08 + 0.80*p);
    const attnBlock= pct(0.08 + 0.88*p);
    const blockHot = false; // keep neutral — no red highlight on "block"

    // boxes stay fixed in place; only each label animates from centered (idle) to top-left (training)
    return {
      attnPick, attnUp, attnThe, attnRed, attnBlock,
      blockBg: blockHot ? accent : '#f4f4f4',
      blockFg: blockHot ? '#fff' : '#4a4a4a',
      accent,
      detailOpacity: training ? 1 : 0,
      demoOpacity: 1,
      detailPointer: training ? 'auto' : 'none',
      labelPosition: training ? 'static' : 'absolute',
      labelTop: training ? 'auto' : '50%',
      labelLeft: training ? 'auto' : '50%',
      labelTransform: training ? 'none' : 'translate(-50%,-50%)',
      inputLeft: '2.5%', inputTop: '50%', inputTransform: 'translateY(-50%)',
      visionLeft: '50%', visionTop: '4%', visionTransform: 'translateX(-50%)',
      outputLeft: 'auto', outputRight: '2.5%', outputTop: '50%', outputTransform: 'translateY(-50%)',
      langLeft: '50%', langTop: '73%', langTransform: 'translateX(-50%)',
      heroOpacity: training ? 0.25 : 1,
      flowOpacity: (this.props.showFlow ?? true) ? 1 : 0,
      heroOpacity: training ? 0.25 : 1,
      flowOpacity: (this.props.showFlow ?? true) ? 1 : 0,
      flowSignalOpacity: training ? 1 : 0,
      tokAnim: training ? 'tokfeed 1.4s ease-in-out infinite' : 'none',
      statusText: training ? 'TRAINING' : 'IDLE',
      statusDot: training ? accent : '#c9c9c9',
      dotAnim: training ? 'pulse 1.4s ease-in-out infinite' : 'none',
      lossText: loss.toFixed(3),
      barPct: (progress*100).toFixed(0) + '%',
      buttonLabel: training ? 'Reset' : 'Start Training',
      btnBg: training ? '#fff' : '#111',
      btnFg: training ? '#111' : '#fff',
      btnBorder: training ? 'rgba(0,0,0,.22)' : '#111',
      onToggle: training ? this.reset : this.startTraining,
      onEnter: this.onEnter, onLeave: this.onLeave,
      setStage: this.setStage, setWireSvg: this.setWireSvg,
      setInput: this.setInput, setPrompt: this.setPrompt, setVisionCard: this.setVisionCard,
      setLangCard: this.setLangCard, setOutputCard: this.setOutputCard,
      setDemo: this.setDemo, setVision: this.setVision, setArm: this.setArm, setLossCurve: this.setLossCurve,
    };
  }
}
</script>
